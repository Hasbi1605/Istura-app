name: CI/CD production

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}
  DEPLOY_BUCKET: ${{ vars.DEPLOY_BUCKET }}
  INSTANCE_ID: ${{ vars.INSTANCE_ID }}
  DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
  HEALTHCHECK_HOST: ${{ vars.HEALTHCHECK_HOST }}
  PRODUCTION_BASE_URL: ${{ vars.PRODUCTION_BASE_URL }}

jobs:
  quality:
    name: Test and build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: bcmath, curl, dom, fileinfo, gd, mbstring, pdo_sqlite, xml
          coverage: none

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm

      - name: Install backend dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Prepare test environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Install frontend dependencies
        run: npm ci --ignore-scripts

      - name: Build frontend
        run: npm run build

      - name: Run backend tests
        run: php artisan test

  deploy:
    name: Deploy to AWS EC2 via SSM
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Validate deployment variables
        run: |
          set -euo pipefail
          missing=0
          for name in AWS_REGION AWS_ROLE_ARN DEPLOY_BUCKET INSTANCE_ID DEPLOY_PATH HEALTHCHECK_HOST PRODUCTION_BASE_URL; do
            if [ -z "${!name:-}" ]; then
              echo "::error::GitHub Actions variable $name is required for production deploy"
              missing=1
            fi
          done
          exit "$missing"

      - name: Configure short-lived AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.2.0
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: istura-${{ github.run_id }}

      - name: Build and upload source artifact
        id: artifact
        run: |
          set -euo pipefail
          artifact="$RUNNER_TEMP/istura-${GITHUB_SHA}.tar.gz"
          git archive --format=tar.gz --output="$artifact" HEAD
          artifact_uri="s3://${DEPLOY_BUCKET}/deploy/${GITHUB_SHA}.tar.gz"
          aws s3 cp "$artifact" "$artifact_uri" --only-show-errors
          echo "uri=$artifact_uri" >> "$GITHUB_OUTPUT"

      - name: Deploy artifact through SSM
        env:
          ARTIFACT_URI: ${{ steps.artifact.outputs.uri }}
        run: |
          set -euo pipefail

          remote_command="$(cat <<REMOTE
          set -euo pipefail
          work_dir=/tmp/istura-deploy-${GITHUB_SHA}
          rm -rf "\$work_dir"
          mkdir -p "\$work_dir/source"
          trap 'rm -rf "\$work_dir"' EXIT
          /usr/local/bin/aws s3 cp '${ARTIFACT_URI}' "\$work_dir/release.tar.gz" --region '${AWS_REGION}' --only-show-errors
          tar -xzf "\$work_dir/release.tar.gz" -C "\$work_dir/source"
          SOURCE_DIR="\$work_dir/source" DEPLOY_PATH='${DEPLOY_PATH}' DEPLOY_SHA='${GITHUB_SHA}' AWS_REGION='${AWS_REGION}' HEALTHCHECK_HOST='${HEALTHCHECK_HOST}' bash "\$work_dir/source/deploy/aws/deploy.sh"
          REMOTE
          )"

          encoded_command="$(printf '%s' "$remote_command" | base64 | tr -d '\n')"
          parameters="$(
            jq -n \
              --arg command "printf '%s' '$encoded_command' | base64 --decode | bash" \
              '{commands: [$command]}'
          )"
          command_id="$(aws ssm send-command \
            --region "$AWS_REGION" \
            --instance-ids "$INSTANCE_ID" \
            --document-name AWS-RunShellScript \
            --comment "ISTURA deploy ${GITHUB_SHA}" \
            --timeout-seconds 1800 \
            --parameters "$parameters" \
            --query 'Command.CommandId' \
            --output text)"

          echo "SSM command: $command_id"
          status="Pending"
          for attempt in $(seq 1 180); do
            status="$(aws ssm get-command-invocation \
              --region "$AWS_REGION" \
              --command-id "$command_id" \
              --instance-id "$INSTANCE_ID" \
              --query Status \
              --output text 2>/dev/null || echo Pending)"
            case "$status" in
              Success|Cancelled|TimedOut|Failed|Cancelling)
                break
                ;;
            esac
            sleep 10
          done

          invocation="$(aws ssm get-command-invocation \
            --region "$AWS_REGION" \
            --command-id "$command_id" \
            --instance-id "$INSTANCE_ID" \
            --output json)"
          printf '%s\n' "$invocation" | jq -r '.StandardOutputContent'
          printf '%s\n' "$invocation" | jq -r '.StandardErrorContent' >&2

          if [ "$status" != "Success" ]; then
            echo "Deployment failed with SSM status: $status" >&2
            exit 1
          fi

      - name: Verify public production endpoints
        run: |
          set -euo pipefail
          for endpoint in / /up /api/public/bootstrap /api/public/faqs /robots.txt /sitemap.xml; do
            url="${PRODUCTION_BASE_URL}${endpoint}"
            for attempt in $(seq 1 12); do
              if curl --fail --silent --show-error --max-time 20 "$url" >/dev/null; then
                echo "OK $url"
                break
              fi
              if [ "$attempt" -eq 12 ]; then
                echo "Health check failed: $url" >&2
                exit 1
              fi
              sleep 5
            done
          done

      - name: Remove deployment artifact
        if: always() && steps.artifact.outputs.uri != ''
        run: aws s3 rm "${{ steps.artifact.outputs.uri }}" --only-show-errors || true
